<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRR Engine - Secure Login</title>
    <style>
        :root { --blue: #1a73e8; --blue-dark: #1558b0; --gray: #5f6368; }
        body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        .logo { font-size: 28px; font-weight: bold; color: var(--blue); margin-bottom: 8px; letter-spacing: -0.5px; }
        .tagline { color: var(--gray); font-size: 14px; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--gray); text-transform: uppercase; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 16px; border: 1.5px solid #dadce0; border-radius: 8px; font-size: 14px; transition: 0.2s; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        button { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--blue-dark); box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .footer { margin-top: 25px; font-size: 13px; color: var(--gray); }
        .footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
        #error-msg { color: #d93025; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">RRR Engine</div>
        <div class="tagline">Case Management System Login</div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@company.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div id="error-msg">Invalid email or password. Please try again.</div>
        
        <button onclick="handleLogin()" id="loginBtn">Sign In</button>

        <div class="footer">
            Forgot password? <a href="mailto:admin@rrr.com?subject=Password Reset Request">Contact Admin</a>
        </div>
    </div>

    <script>


        // Aapka provide kiya hua URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_xCWWCoBc3wj-trWKYt4wYx18Od6DVOUYCgGYITooQt8d_9Mckv6dJlu_SfjnblugfA/exec";

        async function handleLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const btn = document.getElementById("loginBtn");
            const err = document.getElementById("error-msg");

            if(!email || !password) { 
                err.textContent = "Please fill all fields";
                err.style.display = "block";
                return; 
            }

            // UI Changes
            btn.innerHTML = "Verifying...";
            btn.disabled = true;
            err.style.display = "none";

            try {
                // Google Apps Script ko login request bhej rahe hain
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", email, password })
                });

                const result = await response.json();

                if (result.status === "success") {
                    // Login Details Browser mein save karein
                    localStorage.setItem("rrr_user_role", result.role);
                    localStorage.setItem("rrr_user_email", result.email);
                    localStorage.setItem("rrr_logged_in", "true");
                    
                    // Main application par redirect karein
                    window.location.href = "index.html"; 
                } else {
                    err.textContent = "Invalid Email or Password";
                    err.style.display = "block";
                    btn.innerHTML = "Sign In";
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                err.textContent = "Connection Error. Check your internet.";
                err.style.display = "block";
                btn.innerHTML = "Sign In";
                btn.disabled = false;
            }
        }

        // Enter key se login trigger karein
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
