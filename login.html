<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRR Engine - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a0c10; 
            --card-bg: #111827;
            --primary: #fbbf24; 
            --primary-dark: #d97706; 
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #1a1a1a;
            --input-bg: #0a0c10;
            --radius: 12px;
        }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* Subtle Animated Background Elements */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }
        .glow-1 { top: -50px; right: -50px; }
        .glow-2 { bottom: -50px; left: -50px; }

        .login-card { 
            background: var(--card-bg); 
            padding: 48px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            margin-bottom: 32px;
        }
        .logo { 
            font-size: 40px; 
            font-weight: 800; 
            color: var(--primary); 
            letter-spacing: -1.5px; 
            margin-bottom: 4px;
        }
        .logo span { color: #fff; }
        
        .tagline { 
            color: var(--text-muted); 
            font-size: 15px; 
            font-weight: 400;
        }

        .input-group { 
            text-align: left; 
            margin-bottom: 24px; 
        }
        
        label { 
            display: block; 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 1px; 
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            font-size: 15px; 
            transition: all 0.3s; 
            box-sizing: border-box; 
            background: var(--input-bg); 
            color: var(--text-main); 
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.05); 
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: #000; 
            border: none; 
            border-radius: var(--radius); 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-top: 12px; 
        }
        
        button:hover { 
            background: #fff; 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2); 
        }
        
        button:active { 
            transform: translateY(0); 
        }
        
        button:disabled { 
            background: #1f2937; 
            color: #4b5563; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }

        .footer { 
            margin-top: 32px; 
            font-size: 14px; 
            color: var(--text-muted); 
        }
        
        .footer a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        
        .footer a:hover { 
            color: #fff;
            text-decoration: underline; 
        }

        #error-msg { 
            color: #f87171; 
            font-size: 13px; 
            margin-top: 15px; 
            display: none; 
            background: rgba(248, 113, 113, 0.1); 
            padding: 12px; 
            border-radius: var(--radius); 
            border: 1px solid rgba(248, 113, 113, 0.2); 
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="login-card">
        <div class="logo-wrap">
            <div class="logo">RRR<span>System</span></div>
            <div class="tagline">Secure Authentication Portal</div>
        </div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div id="error-msg">Invalid credentials. Please try again.</div>
        
        <button onclick="handleLogin()" id="loginBtn">Access Dashboard</button>

        <div class="footer">
            Trouble logging in? <a href="mailto:deepesh@startupflora.com?subject=Login Help Needed">Contact Support</a>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_xCWWCoBc3wj-trWKYt4wYx18Od6DVOUYCgGYITooQt8d_9Mckv6dJlu_SfjnblugfA/exec";

        async function handleLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const btn = document.getElementById("loginBtn");
            const err = document.getElementById("error-msg");

            if(!email || !password) { 
                err.textContent = "Please provide both email and password.";
                err.style.display = "block";
                return; 
            }

            btn.innerHTML = "Authenticating...";
            btn.disabled = true;
            err.style.display = "none";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", email, password })
                });

                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem("rrr_user_role", result.role);
                    localStorage.setItem("rrr_user_email", result.email);
                    localStorage.setItem("rrr_logged_in", "true");
                    window.location.href = "index.html"; 
                } else {
                    err.textContent = "Authentication failed. Check your credentials.";
                    err.style.display = "block";
                    btn.innerHTML = "Access Dashboard";
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                err.textContent = "Network error. Please verify your connection.";
                err.style.display = "block";
                btn.innerHTML = "Access Dashboard";
                btn.disabled = false;
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
